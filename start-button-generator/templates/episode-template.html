<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{DOC_TITLE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  /* ── Split-complementary dark palette from #505ED7 ──────────────────
     Base  → blue-indigo  #505ED7  HSL(234°,63%,58%)
     Split1 → warm orange  #D58048  HSL( 24°,63%,56%)  accent / gold
     Split2 → yel-green   #A6D959  HSL( 84°,63%,60%)  positive / ok
  ─────────────────────────────────────────────────────────────────── */
  :root {
    --bg:         #0E101B;
    --surface:    #191B29;
    --surface2:   #1F2236;
    --border:     #282A3E;
    --border2:    #323556;
    --ink:        #E2E4F3;
    --ink2:       #A8ABCA;
    --ink3:       #7E83A9;
    --blue:       #6E79DE;
    --blue-dim:   #3D4699;
    --gold:       #D58048;
    --gold-light: #E7B797;
    --gold-dim:   rgba(213,128,72,0.18);
    --green:      #A6D959;
    --green-dim:  rgba(166,217,89,0.15);
    --shadow:     rgba(0,0,0,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Force backgrounds to print — the critical fix for PDF export */
  html {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page { max-width: 760px; margin: 0 auto; }

  /* ── HEADER ── */
  .show-header {
    text-align: center;
    padding: 2.5rem 1.5rem 2rem;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 2.5rem;
  }
  .show-eyebrow {
    font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--blue); margin-bottom: 0.6rem; font-weight: 600;
  }
  .show-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 3.8rem);
    font-weight: 900; line-height: 1; color: var(--ink); margin-bottom: 0.4rem;
  }
  .show-title span { color: var(--blue); }
  .episode-theme {
    display: inline-block; font-family: 'Lora', serif;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--bg); background: var(--gold); border-radius: 2px;
    padding: 0.25rem 0.9rem; margin-top: 0.8rem;
  }
  .show-subtitle { font-style: italic; font-size: 1rem; color: var(--gold-light); margin-top: 0.65rem; }
  .show-date {
    font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink3); margin-top: 0.75rem;
  }

  /* ── SEGMENTS ── */
  .segment {
    background: var(--surface);
    border-radius: 6px;
    padding: 1.8rem 2rem;
    margin-bottom: 1.6rem;
    border-left: 4px solid var(--blue);
    box-shadow: 2px 4px 18px var(--shadow);
    position: relative;
  }
  .segment.intro { border-left-color: var(--blue); }
  .segment.outro { border-left-color: var(--blue-dim); }
  .segment.gold  { border-left-color: var(--gold); }

  .segment-label {
    font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--blue); font-weight: 700; margin-bottom: 0.4rem;
  }
  .segment.outro .segment-label { color: var(--ink3); }
  .segment.gold  .segment-label { color: var(--gold); }

  .segment-title {
    font-family: 'Playfair Display', serif; font-size: 1.52rem;
    font-weight: 700; color: var(--ink); margin-bottom: 1rem; line-height: 1.22;
  }

  .divider { width: 36px; height: 2px; background: var(--blue); margin-bottom: 1rem; border-radius: 2px; }
  .segment.outro .divider { background: var(--blue-dim); }
  .segment.gold  .divider { background: var(--gold); }

  .segment p { font-size: 0.96rem; line-height: 1.8; color: var(--ink2); }
  .segment p + p { margin-top: 0.85rem; }

  .seg-badge {
    position: absolute; top: 1.4rem; right: 1.6rem;
    font-family: 'Playfair Display', serif; font-size: 2.6rem;
    font-weight: 900; color: var(--blue); opacity: 0.12; line-height: 1;
    pointer-events: none;
  }
  .segment.gold .seg-badge { color: var(--gold); }

  /* ── ICEBREAKER ── */
  .icebreaker {
    background: rgba(110,121,222,0.1);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--blue);
    border-radius: 4px; padding: 1.1rem 1.4rem;
    margin-top: 1.2rem; display: flex; gap: 1rem; align-items: flex-start;
  }
  .icebreaker-icon { font-size: 1.7rem; line-height: 1; flex-shrink: 0; margin-top: 2px; }
  .icebreaker-label {
    font-size: 0.63rem; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--blue); font-weight: 700; margin-bottom: 0.35rem;
  }
  .icebreaker-q {
    font-family: 'Playfair Display', serif; font-size: 1.04rem;
    font-weight: 700; color: var(--ink); line-height: 1.4;
  }

  /* ── HOST NOTE ── */
  .host-note {
    font-style: italic; font-size: 0.84rem; color: var(--gold-light);
    border-top: 1px dashed var(--border2);
    margin-top: 1.1rem; padding-top: 0.85rem;
  }

  /* ── TOOLKIT ── */
  .host-toolkit { margin-top: 1.4rem; display: flex; flex-direction: column; gap: 0.85rem; }
  .toolkit-block {
    background: var(--surface2);
    border-radius: 4px; padding: 1rem 1.2rem;
    border: 1px solid var(--border);
  }
  .toolkit-block.questions { border-top: 2px solid var(--blue); }
  .toolkit-block.starters  { border-top: 2px solid var(--blue-dim); }
  .toolkit-block.movers    { border-top: 2px solid var(--border2); }
  .toolkit-block.panel     { border-top: 2px solid var(--gold); background: var(--gold-dim); }

  .toolkit-label { font-size: 0.61rem; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 700; margin-bottom: 0.6rem; }
  .toolkit-label.questions { color: var(--blue); }
  .toolkit-label.starters  { color: #8E9BE8; }
  .toolkit-label.movers    { color: var(--ink3); }
  .toolkit-label.panel     { color: var(--gold); }

  .toolkit-block ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.45rem; }
  .toolkit-block ul li { font-size: 0.87rem; line-height: 1.6; color: var(--ink2); padding-left: 1.25rem; position: relative; }
  .toolkit-block ul li::before { position: absolute; left: 0; top: 0; font-size: 0.76rem; font-weight: 700; }
  .toolkit-block.questions li::before { content: "?";  color: var(--blue); }
  .toolkit-block.starters  li::before { content: "→"; color: #8E9BE8; }
  .toolkit-block.movers    li::before { content: "↪"; color: var(--ink3); }
  .toolkit-block.panel     li::before { content: "★"; color: var(--gold); }

  /* ── GAME TAGS ── */
  .game-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
  .game-tag {
    display: inline-block; font-size: 0.63rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.22rem 0.65rem; border-radius: 3px;
    background: rgba(110,121,222,0.12); color: var(--ink2);
    border: 1px solid var(--border2);
  }
  .game-tag.out  { background: var(--green-dim); color: var(--green); border-color: rgba(166,217,89,0.35); }
  .game-tag.soon { background: var(--gold-dim);  color: var(--gold);  border-color: rgba(213,128,72,0.4); }

  /* ── CELEBRATION CALLOUT ── */
  .celebration {
    background: linear-gradient(135deg, rgba(213,128,72,0.1) 0%, rgba(110,121,222,0.08) 100%);
    border: 1px solid rgba(213,128,72,0.3);
    border-radius: 4px; padding: 0.85rem 1.1rem;
    margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 0.7rem;
  }
  .celebration-icon { font-size: 1.35rem; flex-shrink: 0; line-height: 1; margin-top: 0.1rem; }
  .celebration-text { font-size: 0.87rem; color: var(--ink2); line-height: 1.56; }
  .celebration-text strong { color: var(--gold-light); }

  /* ── PANEL QUESTION BLOCK ── */
  .panel-block {
    background: var(--gold-dim); border: 1px solid rgba(213,128,72,0.28);
    border-radius: 4px; padding: 1rem 1.2rem; margin-top: 1rem;
  }
  .panel-block-label { font-size: 0.61rem; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 700; color: var(--gold); margin-bottom: 0.6rem; }
  .panel-block ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem; }
  .panel-block ul li { font-size: 0.87rem; line-height: 1.6; color: var(--ink2); padding-left: 1.3rem; position: relative; }
  .panel-block ul li::before { content: "★"; position: absolute; left: 0; top: 0; font-size: 0.68rem; color: var(--gold); }

  /* ── FOOTER ── */
  .show-footer {
    text-align: center; margin-top: 3rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink3);
  }

  /* ── PRINT / PDF ── */
  @media print {
    body { background: var(--bg) !important; padding: 0; }
    .page { max-width: none; }
    .segment { break-inside: avoid-page; box-shadow: none; }
  }
</style>
</head>
<body>
<div class="page">
<!--CONTENT-->
</div>
</body>
</html>
